<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Archery Noteは、アーチェリーの得点・着弾・用具をまとめて残し、練習後にサイトを動かすか・保留するかの判断材料を見られる練習ノートです。">
<meta name="theme-color" content="#1a5c3a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#143626" media="(prefers-color-scheme: dark)">
<meta property="og:title" content="Archery Note — 得点記録 &amp; サイト調整">
<meta property="og:description" content="アーチェリーの得点・着弾・用具をまとめて残し、練習後にサイトを動かすか・保留するかの判断材料を見られる練習ノートです。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://eita115115.github.io/archery-note/">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Archery Note — 得点記録 &amp; サイト調整</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app">
  <div class="appLogo" aria-hidden="true"><img src="icon.svg" alt=""></div>
  <div class="appIdentity"><h1>Archery Note</h1></div>
  <button class="gear" id="btnSettings" aria-label="設定">⚙</button>
</header>
<main id="main">
  <section class="bootFallback" id="bootFallback" aria-live="polite">
    <div class="bootIcon">🏹</div>
    <h2>読み込みに時間がかかっています</h2>
    <p>通信が不安定な場合は再読み込みしてください。記録は端末内に保存されます。</p>
    <a class="btn bootReload" href="./index.html">再読み込み</a>
  </section>
</main>
<nav class="tabs" id="tabs" aria-label="主な画面">
  <!-- aria-current="page" は初期ビュー=record と同期。既定ビューを変えるときは render() 側と合わせること -->
  <button data-v="record" aria-label="記録" aria-current="page"><span class="ic ic-record" aria-hidden="true"></span>記録</button>
  <button data-v="history" aria-label="履歴"><span class="ic ic-history" aria-hidden="true"></span>履歴</button>
  <button data-v="analysis" aria-label="分析"><span class="ic ic-analysis" aria-hidden="true"></span>分析</button>
  <button data-v="sight" aria-label="サイト調整"><span class="ic ic-sight" aria-hidden="true"></span>サイト調整</button>
  <button data-v="gear" aria-label="用具"><span class="ic ic-gear" aria-hidden="true"></span>用具</button>
</nav>
<button type="button" class="updbar" id="updBar" hidden aria-live="polite">新しい版があります。タップで更新</button>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="scripts/00-compat.js"></script>
<script src="scripts/10-storage-native.js"></script>
<script src="scripts/20-scoring.js"></script>
<script src="scripts/30-target-svg.js"></script>
<script src="scripts/40-analysis-physics.js"></script>
<script src="scripts/45-analysis-core.js"></script>
<script src="scripts/46-form-core.js"></script>
<script src="scripts/47-form-view.js"></script>
<script src="scripts/50-record-view.js"></script>
<script src="scripts/60-history-sight-view.js"></script>
<script src="scripts/70-gear-settings.js"></script>
<script src="scripts/90-init.js"></script>
</body>
</html>

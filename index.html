<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Archery Noteは、アーチェリーの得点・着弾位置・サイト値・風・用具を記録し、練習傾向とサイト調整の目安を確認できるPWAです。">
<meta name="theme-color" content="#1a5c3a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#143626" media="(prefers-color-scheme: dark)">
<meta property="og:title" content="Archery Note — 得点記録 &amp; サイト調整">
<meta property="og:description" content="アーチェリーの得点・着弾位置・サイト値・風・用具を記録し、練習傾向とサイト調整の目安を確認できるPWAです。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://eita115115.github.io/archery-note/">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Archery Note — 得点記録 &amp; サイト調整</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app">
  <div class="appLogo">🏹</div>
  <div class="appIdentity"><h1>Archery Note</h1><div class="sub">データで育つ記録アプリ</div></div>
  <div class="statusPill" id="appStatus"><span class="statusDot"></span><span>起動中</span></div>
  <button class="gear" id="btnSettings" aria-label="設定">⚙</button>
</header>
<main id="main"></main>
<nav class="tabs" id="tabs">
  <button data-v="record"><span class="ic">🎯</span>記録</button>
  <button data-v="history"><span class="ic">📈</span>履歴</button>
  <button data-v="sight"><span class="ic">🔧</span>サイト調整</button>
  <button data-v="gear"><span class="ic">🏹</span>用具</button>
</nav>
<div class="updbar" id="updBar">🔄 新しいバージョンがあります — タップで更新</div>
<div class="toast" id="toast"></div>

<script src="scripts/00-compat.js"></script>
<script src="scripts/10-storage-native.js"></script>
<script src="scripts/20-scoring.js"></script>
<script src="scripts/30-target-svg.js"></script>
<script src="scripts/40-analysis-physics.js"></script>
<script src="scripts/50-record-view.js"></script>
<script src="scripts/60-history-sight-view.js"></script>
<script src="scripts/70-gear-settings.js"></script>
<script src="scripts/90-init.js"></script>
</body>
</html>
